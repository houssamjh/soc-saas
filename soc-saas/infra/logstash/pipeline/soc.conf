input {
  # Beats input (Filebeat, Metricbeat, etc.)
  beats {
    port => 5044
    type => "beats"
  }

  # Syslog UDP
  udp {
    port => 5514
    type => "syslog"
    codec => plain {
      charset => "UTF-8"
    }
  }

  # Syslog TCP
  tcp {
    port => 5514
    type => "syslog"
    codec => line {
      charset => "UTF-8"
    }
  }
}

filter {
  # ── JSON Events ─────────────────────────────────────────────
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    if "_jsonparsefailure" not in [tags] {
      mutate {
        rename => { "[parsed][event_type]"  => "event_type" }
        rename => { "[parsed][source_ip]"   => "source_ip" }
        rename => { "[parsed][severity]"    => "severity" }
        rename => { "[parsed][message]"     => "raw_message" }
        rename => { "[parsed][hostname]"    => "hostname" }
        rename => { "[parsed][user]"        => "user" }
        rename => { "[parsed][action]"      => "action" }
        remove_field => ["parsed"]
      }
    }
  }

  # ── CEF Events ──────────────────────────────────────────────
  else if [message] =~ /^CEF:/ {
    grok {
      match => {
        "message" => "CEF:%{INT:cef_version}\|%{DATA:cef_device_vendor}\|%{DATA:cef_device_product}\|%{DATA:cef_device_version}\|%{DATA:cef_signature_id}\|%{DATA:cef_name}\|%{INT:cef_severity}\|%{GREEDYDATA:cef_extensions}"
      }
      tag_on_failure => ["_cefparsefailure"]
    }

    if "_cefparsefailure" not in [tags] {
      mutate {
        add_field => { "event_type" => "cef" }
        rename    => { "cef_name"   => "alert_title" }
      }
      # Map CEF severity (0-10) to our severity levels
      if [cef_severity] >= 9 {
        mutate { add_field => { "severity" => "critical" } }
      } else if [cef_severity] >= 7 {
        mutate { add_field => { "severity" => "high" } }
      } else if [cef_severity] >= 4 {
        mutate { add_field => { "severity" => "medium" } }
      } else {
        mutate { add_field => { "severity" => "low" } }
      }
    }
  }

  # ── Syslog Events ───────────────────────────────────────────
  else if [type] == "syslog" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}",
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{GREEDYDATA:syslog_message}"
        ]
      }
      tag_on_failure => ["_syslogparsefailure"]
    }

    if "_syslogparsefailure" not in [tags] {
      date {
        match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
        target => "@timestamp"
      }

      mutate {
        add_field    => { "event_type"   => "syslog" }
        rename       => { "syslog_message" => "raw_message" }
        remove_field => ["syslog_timestamp"]
      }

      # Detect authentication events
      if [raw_message] =~ /(?i)(failed|invalid|authentication failure|unauthorized)/ {
        mutate { add_field => { "severity" => "high" } }
        mutate { add_field => { "alert_category" => "authentication" } }
      } else if [raw_message] =~ /(?i)(accepted|success|logged in)/ {
        mutate { add_field => { "severity" => "low" } }
        mutate { add_field => { "alert_category" => "authentication" } }
      }
    }
  }

  # ── IP Extraction ────────────────────────────────────────────
  grok {
    match => { "message" => "%{IP:source_ip}" }
    tag_on_failure => []
    overwrite => ["source_ip"]
  }

  # ── Default Field Population ─────────────────────────────────
  if ![event_type] {
    mutate { add_field => { "event_type" => "unknown" } }
  }

  if ![severity] {
    mutate { add_field => { "severity" => "low" } }
  }

  if ![source_ip] {
    mutate { add_field => { "source_ip" => "0.0.0.0" } }
  }

  # Add ingest metadata
  mutate {
    add_field => {
      "ingest_pipeline" => "logstash-soc"
      "log_source"      => "%{[type]}"
    }
    remove_field => ["host", "agent", "ecs", "input", "log"]
  }

  # Normalize severity to lowercase
  mutate {
    lowercase => ["severity"]
  }
}

output {
  # Send all normalized events to Elasticsearch
  elasticsearch {
    hosts            => ["${ELASTIC_HOST:elasticsearch}:${ELASTIC_PORT:9200}"]
    index            => "soc-raw-logs-%{+YYYY.MM.dd}"
    document_type    => "_doc"
    manage_template  => true
    template_name    => "soc-raw-logs"
    template_overwrite => true
  }

  # Forward raw events to Kafka for SIEM processing
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topic_id          => "raw-events"
    codec             => json
    retries           => 3
    acks              => "1"
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
